<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🌐 글로벌 테크 뉴스 — 작전 상황실 (Tactical Globe)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- header -->
  <header class="header">
    <div class="brand">
      <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><ellipse cx="12" cy="12" rx="9" ry="3.6"/><path d="M12 3v18M3.2 9.5h17.6M3.2 14.5h17.6"/></svg></span>
      <span><b>글로벌 테크 뉴스</b> <small>TACTICAL GLOBE</small></span>
    </div>
    <div class="sub">AI · 반도체 · 우주 · 방산 · 양자 · 자율주행 &nbsp;|&nbsp; <b id="hStat">139</b> SIGNALS · <b id="hCo">12</b> ZONES · 2026.05–06</div>
    <div class="spacer"></div>
    <button class="hbtn" id="btnArc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 16c4-10 12-10 16 0"/><circle cx="4" cy="16" r="1.6" fill="currentColor"/><circle cx="20" cy="16" r="1.6" fill="currentColor"/></svg> 거래선</button>
    <button class="hbtn on warm" id="btnRotate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12a9 9 0 1 1-3-6.7M21 4v4h-4"/></svg> 자동회전</button>
    <button class="hbtn" id="btnReset"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12a9 9 0 1 0 9-9 9 9 0 0 0-6.7 3M3 3v4h4"/></svg> 초기화</button>
    <a class="src" href="https://brswinvesting.phyksw.workers.dev/news" target="_blank" rel="noopener">SOURCE ↗</a>
  </header>

  <!-- left: infographic filters -->
  <aside class="left">
    <div class="block">
      <div class="s-title">섹터 강세 <span class="hint">막대 = 현재 필터 건수</span></div>
      <div class="sec-list" id="sectorBars"></div>
    </div>
    <div class="block">
      <div class="s-title">뉴스 종류</div>
      <div class="chips" id="typeChips"></div>
    </div>
    <div class="block">
      <div class="s-title" id="focusTitle">국가 순위</div>
      <div id="focus"></div>
    </div>
  </aside>

  <!-- center: globe + tactical HUD -->
  <main class="center">
    <div class="globe-stars" id="globeStars"></div>
    <div id="globe"></div>
    <div class="hud">
      <div class="br tl"></div><div class="br tr"></div><div class="br bl"></div><div class="br brr"></div>
      <div class="reticle"></div><div class="ring"></div>
      <div class="hud-tag feed"><span class="dot"></span><span class="val">LIVE FEED</span><span class="lbl" id="hudMode">ORBIT VIEW</span></div>
      <div class="hud-tag readout">
        <div class="row"><span class="lbl">LAT</span><span class="val" id="hudLat">+00.0°</span></div>
        <div class="row"><span class="lbl">LON</span><span class="val" id="hudLon">+000.0°</span></div>
        <div class="row"><span class="lbl">TGT</span><span class="val" id="hudTgt">139</span></div>
      </div>
    </div>
    <div class="glob-hint">핀·뉴스 클릭 → 좌표 회전 · 드래그 회전 · 영토 클릭 → 해당국 필터</div>
    <div class="palette-bar" id="paletteBar" title="지구본 색상표"></div>
  </main>

  <!-- right: timeline -->
  <aside class="right">
    <div class="tl-head">
      <h2><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 7v5l3 2"/><circle cx="12" cy="12" r="9"/></svg></span> 타임라인</h2>
      <span class="cnt" id="tlCount">139</span>
      <span class="clr" id="tlClear">필터 해제</span>
    </div>
    <div class="tl-active" id="tlActive"></div>
    <div class="tl" id="timeline"></div>
  </aside>

</div>

<script src="data/world.js"></script>
<script src="data/news.js"></script>
<script src="vendor/globe.gl.min.js"></script>
<script src="app.js"></script>
</body>
</html>
